name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Brand assets (committed PNGs)
        run: |
          test -f custom_components/helio_zero/brand/icon.png
          test -f custom_components/helio_zero/brand/icon@2x.png
          test -f custom_components/helio_zero/brand/dark_icon.png
          test -f custom_components/helio_zero/brand/logo.png
          test ! -f custom_components/helio_zero/icon.png
          cmp custom_components/helio_zero/brand/icon.png custom_components/helio_zero/brand/dark_icon.png && exit 1 || true
      - uses: home-assistant/actions/hassfest@master
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
          ignore: description topics
      - name: Install test dependencies
        run: pip install -r requirements-dev.txt
      - name: Python syntax check
        run: python3 -m compileall custom_components/helio_zero
      - name: Unit tests
        run: ./scripts/test-unit.sh
      - name: Release zip layout
        run: |
          chmod +x scripts/build-release.sh
          ./scripts/build-release.sh
          unzip -l helio-zero-hacs.zip | grep -q ' manifest.json$'
          unzip -l helio-zero-hacs.zip | grep -q 'helio_zero/manifest.json' && exit 1 || true
